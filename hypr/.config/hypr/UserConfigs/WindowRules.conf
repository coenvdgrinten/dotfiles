# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #
# For window rules and layerrules
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more

# This file is used to add or overwrite window rules 
# This file will not be modified during dotfiles updates
# ============================================================
# Auto-assign apps to workspaces (using existing tags)
# ============================================================
# Workspace 1: Default / General
# Workspace 2: Browser (work)
# Workspace 3: VSCode (official + insiders)
# Workspace 4: Terminals
# Workspace 5: Spotify
# Workspace 6: Zulip
# Workspace 7: File Manager
# Workspace 8: Google Gemini (Brave app)
# Workspace 9: Gmail (Brave app)

# Workspace 2: Browser (work)
windowrule = match:tag browser* match:floating off, workspace 2

# Workspace 3: VSCode (official + insiders)
windowrule = match:class ^(code|code-url-handler|VSCode)$ match:floating off, workspace 3
windowrule = match:class ^(code-insiders|code-insiders-url-handler)$ match:floating off, workspace 3

# Workspace 4: Terminals
windowrule = match:tag terminal* match:floating off, workspace 4

# Workspace 5: Spotify
windowrule = match:class ^([Ss]potify)$ match:floating off, workspace 5

# Workspace 6: Zulip
windowrule = match:class ^(Zulip)$ match:floating off, workspace 6
windowrule = match:class ^(zulip-desktop)$ match:floating off, workspace 6

# Workspace 7: File Manager
windowrule = match:tag file-manager* match:floating off, workspace 7

# Workspace 8: Google Gemini (Brave browser app)
windowrule = match:title .*Gemini.* match:floating off, workspace 8

# Workspace 9: Gmail (Brave browser app)
windowrule = match:title .*Gmail.* match:floating off, workspace 9
