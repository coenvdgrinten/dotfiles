# /* ---- 💫 Animated Hyprlock ---- */  #
# Enhanced hyprlock with subtle animations and effects

source = $HOME/.config/hypr/wallust/wallust-hyprland.conf
$Scripts = $HOME/.config/hypr/scripts

general {
    grace = 1
    fractional_scaling = 2
    immediate_render = true
    hide_cursor = true
}

background {
    monitor =
    path = $HOME/.config/hypr/wallpaper_effects/.wallpaper_current
    color = rgb(0,0,0)
    blur_size = 7
    blur_passes = 2
    noise = 0.0117
    contrast = 1.5
    brightness = 0.6
    vibrancy = 0.3
    vibrancy_darkness = 0.1
}

# Animated clock with seconds
label {
    monitor =
    text = cmd[update:1000] date +"%I:%M:%S %p"
    color = rgba(255, 255, 255, 0.9)
    font_size = 100
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, -200
    halign = center
    valign = top
}

# Date
label {
    monitor =
    text = cmd[update:60000] date +'%A, %B %-d, %Y'
    color = rgba(255, 255, 255, 0.6)
    font_size = 28
    font_family = Victor Mono
    position = 0, -120
    halign = center
    valign = top
}

# User
label {
    monitor =
    text =   $USER
    color = rgba(255, 255, 255, 0.7)
    font_size = 24
    font_family = Victor Mono
    position = 0, 250
    halign = center
    valign = bottom
}

# Input field
input-field {
    monitor =
    size = 250, 55
    outline_thickness = 3
    dots_size = 0.15
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(255, 255, 255, 0.1)
    inner_color = rgba(0, 0, 0, 0.4)
    font_color = rgba(255, 255, 255, 0.9)
    fade_on_empty = true
    font_family = Victor Mono
    placeholder_text = <i>Password</i>
    hide_input = false
    position = 0, 100
    halign = center
    valign = bottom
}

# Keyboard layout indicator
label {
    monitor =
    text = $LAYOUT
    color = rgba(255, 255, 255, 0.4)
    font_size = 12
    font_family = Victor Mono
    position = 0, 70
    halign = center
    valign = bottom
}

# Battery
label {
    monitor =
    text = cmd[update:1000] $Scripts/Battery.sh
    color = rgba(255, 255, 255, 0.5)
    font_size = 14
    font_family = Victor Mono
    position = 0, 30
    halign = right
    valign = bottom
}

# Uptime
label {
    monitor =
    text = cmd[update:60000] uptime -p
    color = rgba(255, 255, 255, 0.4)
    font_size = 12
    font_family = Victor Mono
    position = 0, 0
    halign = right
    valign = bottom
}
